name: quelita

services:
  # ---------- Base de datos ----------
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db          # datos persistentes
    networks: [ internal ]
    # OJO: SIN "ports:" -> Mongo NO se expone a internet, solo red interna
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- API (Express) ----------
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    depends_on:
      mongo:
        condition: service_healthy   # espera a que Mongo esté listo
    volumes:
      - uploads_data:/app/uploads    # imágenes persistentes
    networks: [ internal ]

  # ---------- Web (Next.js) ----------
  frontend:
    build:
      context: ./frontend
      args:
        # Se hornean en el build (vienen del .env de la raíz)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER}
    restart: unless-stopped
    depends_on: [ backend ]
    networks: [ internal ]

  # ---------- Reverse proxy + HTTPS ----------
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"                    # único punto expuesto al mundo
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - uploads_data:/srv/uploads:ro # mismo volumen, solo-lectura, para servir imágenes
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [ frontend, backend ]
    networks: [ internal ]

  # ---------- Túnel público de DEMO (opcional) ----------
  # Quick Tunnel de Cloudflare: URL publica gratis, sin cuenta, detras de CGNAT/Starlink.
  # NO arranca por defecto. Solo con:  docker compose --profile demo up -d cloudflared
  # La URL (https://xxxx.trycloudflare.com) aparece en:  docker compose logs cloudflared
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://caddy:80
    depends_on: [ caddy ]
    networks: [ internal ]
    profiles: [ demo ]

networks:
  internal:

volumes:
  mongo_data:
  uploads_data:
  caddy_data:
  caddy_config:
